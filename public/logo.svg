<svg width="200" height="48" viewBox="0 0 200 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Icon container -->
  <rect x="0" y="4" width="40" height="40" rx="10" fill="url(#iconBg)"/>
  <!-- Outer orbit ring -->
  <ellipse cx="20" cy="24" rx="15" ry="11" stroke="#c9a961" stroke-width="1.5" fill="none" transform="rotate(-18 20 24)"/>
  <!-- Inner orbit ring -->
  <ellipse cx="20" cy="24" rx="10" ry="14" stroke="#E04E2C" stroke-width="1.2" fill="none" opacity="0.5" transform="rotate(25 20 24)"/>
  <!-- Core sphere -->
  <circle cx="20" cy="24" r="6" fill="url(#coreGrad)"/>
  <circle cx="18" cy="22" r="1.8" fill="#FBF8F1" opacity="0.7"/>
  <!-- Orbit nodes -->
  <circle cx="32" cy="14" r="2" fill="#c9a961"/>
  <circle cx="9" cy="33" r="1.5" fill="#c9a961" opacity="0.8"/>
  <!-- Wordmark: AUR + stylized E (gold bars) + ON -->
  <text x="50" y="28" font-family="system-ui, sans-serif" font-weight="800" font-size="20" fill="#1A1815" letter-spacing="-0.5">AUR</text>
  <rect x="88" y="13" width="14" height="3" fill="#c9a961"/>
  <rect x="88" y="18.5" width="14" height="3" fill="#c9a961"/>
  <rect x="88" y="24" width="14" height="3" fill="#c9a961"/>
  <text x="106" y="28" font-family="system-ui, sans-serif" font-weight="800" font-size="20" fill="#1A1815" letter-spacing="-0.5">ON</text>
  <!-- Subtitle -->
  <text x="50" y="42" font-family="system-ui, sans-serif" font-weight="600" font-size="10" fill="#c9a961" letter-spacing="4">GROWTH</text>
  <defs>
    <linearGradient id="iconBg" x1="0" y1="4" x2="40" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1A1815"/>
      <stop offset="100%" stop-color="#2D2825"/>
    </linearGradient>
    <linearGradient id="coreGrad" x1="14" y1="18" x2="26" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E04E2C"/>
      <stop offset="100%" stop-color="#A53B1F"/>
    </linearGradient>
  </defs>
</svg>
